<section class="page-card">
  <h2>Course List</h2>

  <div class="filters">
    <input type="text" placeholder="Search courses by name or code" [(ngModel)]="searchText" />
    <button type="button" (click)="search()">Search</button>

    <select [(ngModel)]="selectedCategory">
      @for (status of uniqueStatuses; track status) {
        <option [value]="status">{{ status === 'All' ? 'All Statuses' : status | titlecase }}</option>
      }
    </select>

    <label class="checkbox-row">
      <input type="checkbox" [(ngModel)]="showAvailableOnly" />
      <span>Show only active courses</span>
    </label>
  </div>

  <div class="summary">
    <p>Total Courses: {{ courses.length }}</p>
    <p>Displayed Courses: {{ filteredCourses.length }}</p>
  </div>

  <div class="course-grid">
    @for (course of (courses$ | async) ?? []; track course.id) {
      <a class="course-link" [routerLink]="['/courses', course.id]">
        <app-course-card [course]="course"></app-course-card>
      </a>
    }
  </div>
</section>
