<section class="hero-card">
  <h1>Welcome to Student Course Portal</h1>
  <p>Track your academic progress, discover new courses, and stay informed about your learning journey.</p>

  <div class="info-row">
    <p><strong>Welcome {{ studentName }}</strong></p>
    <p>Current Course: {{ courseName }}</p>
    <p>Available Courses: {{ courseCount }}</p>
    <p>Enrollment Status: {{ isEnrolled ? 'Enrolled' : 'Not Enrolled' }}</p>
  </div>

  <div class="binding-demo">
    <label for="student-name">Student Name</label>
    <input id="student-name" type="text" [(ngModel)]="studentName" />

    <button type="button" (click)="enrollNow()" [disabled]="isEnrolled">Enroll Now</button>
  </div>
</section>
